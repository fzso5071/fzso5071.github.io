        /* 添加一些基本的CSS样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

        .header {
            background-color: #f8f8f8;
            text-align: center;
            padding: 20px;
        }
        .nav {
            display: flex;
            justify-content: space-around;

        .main {
            padding: 20px;
        }
      /* 导航栏下划线效果 */
.nav a::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 2px;
    left: 0;
    bottom: -5px;
    transition: opacity 0.3s;
    opacity: 0;
}
.nav a:hover::after {
    opacity: 1;
}

/* 主要内容区域的样式 */
.main p {
    font-size: 16px;

}

/* 头像和社交链接 */

    height: 150px;

}
.social-links {
    float: left;
    margin-left: 20px;
}
.social-links a {
    display: inline-block;
    margin-right: 10px;
